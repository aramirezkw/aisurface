<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KWIQ · Concept 1 — Composer-First</title>
<!-- XDS tokens used: system.action, system.actionHover, system.containerTinted,
     neutral.labelPrimary/Secondary/Tertiary, neutral.pageBackground/containerBackground/containerTinted,
     neutral.divider; Mulish (Google Fonts); 8px spacing; button radius 4px.
     Note: prompt suggestion pills use Chip (subtle) styling → pill radius is on-system for chips. -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,400..900;1,400..900&display=swap');
:root{
  --system-action:#006C84; --system-action-hover:#0E4E5D; --system-action-active:#017C98;
  --system-tinted:#D5F7FF; --system-divider:rgba(0,108,132,.1);
  --label-primary:#282B33; --label-secondary:#3D424D; --label-tertiary:#6C727E; --label-inverse:#FFFFFF;
  --page-bg:#F7F7F8; --container-bg:#FFFFFF; --container-tinted:#E4E5E7; --divider:rgba(43,43,51,.1);
  --space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;--space-6:24px;--space-8:32px;--space-12:48px;
  --shadow12:0 4px 12px rgba(40,43,51,.10); --shadow04:0 1px 4px rgba(40,43,51,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body,*{font-family:'Mulish',sans-serif}
body{background:var(--page-bg);color:var(--label-primary);-webkit-font-smoothing:antialiased}
.panel{max-width:900px;margin:0 auto;min-height:100vh;background:var(--container-bg);display:flex;flex-direction:column;position:relative}
/* top chrome */
.chrome{height:56px;display:flex;align-items:center;justify-content:flex-end;gap:var(--space-1);padding:0 var(--space-4);border-bottom:1px solid var(--divider)}
.icon-btn{width:36px;height:36px;border-radius:4px;display:grid;place-items:center;background:none;border:none;color:var(--label-secondary);cursor:pointer;transition:background .18s ease,color .18s ease}
.icon-btn:hover{background:rgba(61,66,77,.06);color:var(--label-primary)}
/* surface */
.surface{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--space-8) var(--space-6) var(--space-12)}
.center{width:100%;max-width:680px}
.greet{display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-6)}
.avatar{width:40px;height:40px;border-radius:999px;background:var(--system-tinted);color:var(--system-action);display:grid;place-items:center;font-weight:800;font-size:16px;flex:none}
h1{font-size:32px;line-height:40px;font-weight:800;letter-spacing:-.01em}
h1 .hi{color:var(--system-action)}
.sub{font-size:32px;line-height:40px;font-weight:800;color:var(--label-tertiary);letter-spacing:-.01em}
@media(max-width:560px){h1,.sub{font-size:24px;line-height:32px}}
/* composer */
.composer{margin-top:var(--space-6);border:1.5px solid var(--divider);border-radius:16px;background:var(--container-bg);box-shadow:var(--shadow12);transition:border-color .2s ease,box-shadow .2s ease}
.composer:focus-within{border-color:var(--system-action);box-shadow:0 0 0 4px var(--system-divider)}
.composer .field{display:flex;align-items:center;padding:var(--space-4) var(--space-4) var(--space-2)}
.composer input{flex:1;border:none;outline:none;font-size:16px;line-height:24px;color:var(--label-primary);background:none}
.composer input::placeholder{color:var(--label-tertiary)}
.composer .rail{display:flex;align-items:center;justify-content:space-between;padding:var(--space-2) var(--space-3) var(--space-3)}
.rail-left,.rail-right{display:flex;align-items:center;gap:var(--space-2)}
.plus{width:32px;height:32px;border-radius:4px;border:none;background:none;color:var(--label-secondary);display:grid;place-items:center;cursor:pointer;transition:background .18s}
.plus:hover{background:rgba(61,66,77,.06)}
.model{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--label-secondary);background:none;border:none;padding:6px 8px;border-radius:4px;cursor:pointer;transition:background .18s}
.model:hover{background:rgba(61,66,77,.06)}
.send{width:36px;height:36px;border-radius:4px;border:none;background:var(--system-action);color:#fff;display:grid;place-items:center;cursor:pointer;transition:background .18s ease,transform .18s ease}
.send:hover{background:var(--system-action-hover)}
.send:active{transform:scale(.94)}
.voice{width:36px;height:36px;border-radius:4px;border:none;background:none;color:var(--system-action);display:grid;place-items:center;cursor:pointer;transition:background .18s}
.voice:hover{background:var(--system-tinted)}
/* chips below */
.chips{display:flex;flex-wrap:wrap;gap:var(--space-2);justify-content:center;margin-top:var(--space-6)}
.chip{display:inline-flex;align-items:center;gap:var(--space-2);padding:8px 14px;border-radius:999px;background:var(--page-bg);border:1px solid var(--divider);color:var(--label-primary);font-size:14px;font-weight:700;cursor:pointer;transition:background .18s ease,border-color .18s ease,transform .18s ease;opacity:0;transform:translateY(8px);animation:chipIn .5s cubic-bezier(.16,1,.3,1) forwards}
.chip:hover{background:var(--system-tinted);border-color:var(--system-action);transform:translateY(-2px)}
.chip svg{color:var(--system-action);flex:none}
@keyframes chipIn{to{opacity:1;transform:none}}
.foot{text-align:center;font-size:12px;line-height:16px;color:var(--label-tertiary);padding:var(--space-4)}
.fade{opacity:0;animation:fadeUp .6s cubic-bezier(.16,1,.3,1) forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="panel">
  <div class="chrome">
    <button class="icon-btn" aria-label="More options"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.7"/><circle cx="12" cy="12" r="1.7"/><circle cx="19" cy="12" r="1.7"/></svg></button>
    <button class="icon-btn" aria-label="Open in new window"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg></button>
    <button class="icon-btn" aria-label="Close"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
  </div>

  <div class="surface">
    <div class="center">
      <div class="greet fade">
        <div class="avatar">N</div>
        <div>
          <h1><span class="hi">Hello, Nina</span></h1>
          <div class="sub">How can I help you today?</div>
        </div>
      </div>

      <div class="composer fade" style="animation-delay:.08s">
        <div class="field">
          <input id="prompt" placeholder="Ask anything, or type @ to reference a tab" />
        </div>
        <div class="rail">
          <div class="rail-left">
            <button class="plus" aria-label="Add context"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
          </div>
          <div class="rail-right">
            <button class="model">KWIQ Flash <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></button>
            <button class="voice" aria-label="Voice input"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg></button>
            <button class="send" aria-label="Send"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button>
          </div>
        </div>
      </div>

      <div class="chips" id="chips"></div>
    </div>
  </div>

  <div class="foot fade" style="animation-delay:.3s">KWIQ can make mistakes. Verify important details.</div>
</div>

<script>
const ICONS = {
  cube:'<path d="M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5M12 22V12"/>',
  user:'<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
  pencil:'<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/>',
  speaker:'<path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/>',
  list:'<path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>',
  bars:'<path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="6"/><rect x="12" y="7" width="3" height="10"/><rect x="17" y="13" width="3" height="4"/>',
  folder:'<path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.7-.9L9.6 3.9A2 2 0 0 0 7.9 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/>',
  doc:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h6"/>'
};
const PROMPTS = [
  ['cube','Summarize my pipeline'],
  ['user','Find contacts to call today'],
  ['pencil','Draft a listing description'],
  ['speaker','Generate social post for a listing'],
  ['list','Follow up with leads'],
  ['bars','Write a market update email'],
  ['folder','Analyze a recent comp'],
  ['doc','Create a smart plan']
];
const wrap = document.getElementById('chips');
PROMPTS.forEach((p,i)=>{
  const b=document.createElement('button');
  b.className='chip'; b.style.animationDelay=(0.12+i*0.05)+'s';
  b.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${ICONS[p[0]]}</svg>${p[1]}`;
  b.onclick=()=>{document.getElementById('prompt').value=p[1];document.getElementById('prompt').focus();};
  wrap.appendChild(b);
});
</script>
</body>
</html>
