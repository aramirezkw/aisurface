<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KWIQ · Concept 5 — Workspace Command</title>
<!-- XDS tokens: system.action/Hover/containerTinted/divider, neutral.label*, neutral.pageBackground/
     containerBackground/containerTinted/divider; Mulish; 8px spacing; sidebar uses barElevated shadow; button radius 4px. -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,400..900;1,400..900&display=swap');
:root{
  --system-action:#006C84;--system-action-hover:#0E4E5D;--system-tinted:#D5F7FF;--system-divider:rgba(0,108,132,.1);
  --label-primary:#282B33;--label-secondary:#3D424D;--label-tertiary:#6C727E;
  --page-bg:#F7F7F8;--container-bg:#FFFFFF;--container-tinted:#E4E5E7;--divider:rgba(43,43,51,.1);
  --space-2:8px;--space-3:12px;--space-4:16px;--space-6:24px;--space-8:32px;--space-12:48px;
  --shadow12:0 4px 12px rgba(40,43,51,.10);--bar:0 0 12px rgba(40,43,51,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body,*{font-family:'Mulish',sans-serif}
body{background:var(--page-bg);color:var(--label-primary);-webkit-font-smoothing:antialiased}
.shell{max-width:1080px;margin:0 auto;min-height:100vh;background:var(--container-bg);display:grid;grid-template-columns:232px 1fr}
/* sidebar */
.side{background:var(--page-bg);border-right:1px solid var(--divider);padding:var(--space-4) var(--space-3);display:flex;flex-direction:column}
.brand{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-2) var(--space-6)}
.brand .logo{width:30px;height:30px;border-radius:8px;background:var(--system-action);color:#fff;display:grid;place-items:center;font-weight:900;font-size:14px}
.brand b{font-size:17px;font-weight:900;letter-spacing:-.01em}
.new-chat{display:flex;align-items:center;gap:var(--space-2);width:100%;background:var(--system-action);color:#fff;border:none;border-radius:4px;padding:10px 12px;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:var(--space-6);transition:background .18s}
.new-chat:hover{background:var(--system-action-hover)}
.nav-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--label-tertiary);padding:0 var(--space-2) var(--space-2)}
.nav a{display:flex;align-items:center;gap:var(--space-3);padding:9px var(--space-2);border-radius:8px;color:var(--label-secondary);font-size:14px;font-weight:700;text-decoration:none;cursor:pointer;transition:background .16s,color .16s}
.nav a:hover{background:#fff;color:var(--label-primary)}
.nav a.active{background:var(--system-tinted);color:var(--system-action)}
.nav a svg{color:currentColor;flex:none}
.side-foot{margin-top:auto;display:flex;align-items:center;gap:var(--space-2);padding:var(--space-3) var(--space-2)}
.side-foot .av{width:30px;height:30px;border-radius:999px;background:var(--system-tinted);color:var(--system-action);display:grid;place-items:center;font-weight:800;font-size:13px}
.side-foot small{font-size:12px;color:var(--label-tertiary);font-weight:700}
.side-foot b{font-size:13.5px;font-weight:800;display:block}
/* main */
.main{display:flex;flex-direction:column}
.topbar{height:52px;display:flex;align-items:center;justify-content:flex-end;gap:4px;padding:0 var(--space-4);border-bottom:1px solid var(--divider)}
.icon-btn{width:34px;height:34px;border-radius:4px;display:grid;place-items:center;background:none;border:none;color:var(--label-secondary);cursor:pointer;transition:background .18s,color .18s}
.icon-btn:hover{background:rgba(61,66,77,.06);color:var(--label-primary)}
.work{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:var(--space-8) var(--space-8) var(--space-12)}
.center{width:100%;max-width:640px}
.k-mark{width:44px;height:44px;border-radius:12px;background:var(--system-tinted);color:var(--system-action);display:grid;place-items:center;margin:0 auto var(--space-4);font-weight:900;font-size:18px}
h1{font-size:26px;line-height:34px;font-weight:800;text-align:center;letter-spacing:-.01em}
h1 .hi{color:var(--system-action)}
.sub{text-align:center;font-size:15px;color:var(--label-tertiary);font-weight:600;margin-top:6px}
/* hero composer */
.composer{margin-top:var(--space-6);border:1.5px solid var(--divider);border-radius:16px;background:var(--container-bg);box-shadow:var(--shadow12);transition:border-color .2s,box-shadow .2s}
.composer:focus-within{border-color:var(--system-action);box-shadow:0 0 0 4px var(--system-divider)}
.composer .field{display:flex;align-items:flex-start;padding:var(--space-4) var(--space-4) var(--space-2);gap:var(--space-2)}
.tab-token{display:inline-flex;align-items:center;gap:5px;background:var(--system-tinted);color:var(--system-action);font-size:13px;font-weight:800;padding:4px 9px;border-radius:6px;white-space:nowrap}
.composer input{flex:1;border:none;outline:none;font-size:16px;line-height:24px;color:var(--label-primary);background:none;padding-top:2px}
.composer input::placeholder{color:var(--label-tertiary)}
.composer .rail{display:flex;align-items:center;justify-content:space-between;padding:var(--space-2) var(--space-3) var(--space-3)}
.rail-left,.rail-right{display:flex;align-items:center;gap:var(--space-2)}
.tool{display:inline-flex;align-items:center;gap:6px;background:none;border:1px solid var(--divider);color:var(--label-secondary);border-radius:999px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer;transition:background .18s,border-color .18s,color .18s}
.tool:hover{background:var(--system-tinted);border-color:var(--system-action);color:var(--system-action)}
.plus{width:32px;height:32px;border-radius:4px;border:none;background:none;color:var(--label-secondary);display:grid;place-items:center;cursor:pointer;transition:background .18s}
.plus:hover{background:rgba(61,66,77,.06)}
.model{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--label-secondary);background:none;border:none;padding:6px 8px;border-radius:4px;cursor:pointer;transition:background .18s}
.model:hover{background:rgba(61,66,77,.06)}
.voice{width:34px;height:34px;border-radius:4px;border:none;background:none;color:var(--system-action);display:grid;place-items:center;cursor:pointer;transition:background .18s}
.voice:hover{background:var(--system-tinted)}
.send{width:34px;height:34px;border-radius:4px;border:none;background:var(--system-action);color:#fff;display:grid;place-items:center;cursor:pointer;transition:background .18s,transform .18s}
.send:hover{background:var(--system-action-hover)}.send:active{transform:scale(.94)}
/* connect data row */
.connect{display:flex;align-items:center;gap:var(--space-2);justify-content:center;margin-top:var(--space-4);flex-wrap:wrap}
.connect .lbl{font-size:12px;font-weight:700;color:var(--label-tertiary)}
.source{display:inline-flex;align-items:center;gap:7px;background:var(--page-bg);border:1px solid var(--divider);border-radius:999px;padding:6px 12px;font-size:12.5px;font-weight:700;color:var(--label-secondary);cursor:pointer;transition:background .18s,border-color .18s,transform .18s;opacity:0;transform:translateY(8px);animation:chipIn .5s cubic-bezier(.16,1,.3,1) forwards}
.source:hover{background:var(--system-tinted);border-color:var(--system-action);transform:translateY(-2px)}
.source .dot{width:7px;height:7px;border-radius:999px;background:#0B8331}
.source.off .dot{background:var(--label-tertiary)}
.source svg{color:var(--system-action)}
@keyframes chipIn{to{opacity:1;transform:none}}
/* preset chips */
.presets{display:flex;flex-wrap:wrap;gap:var(--space-2);justify-content:center;margin-top:var(--space-6)}
.preset{display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border-radius:999px;background:var(--container-bg);border:1px solid var(--divider);color:var(--label-primary);font-size:13.5px;font-weight:700;cursor:pointer;transition:background .18s,border-color .18s,transform .18s}
.preset:hover{background:var(--system-tinted);border-color:var(--system-action);transform:translateY(-2px)}
.preset svg{color:var(--system-action)}
.fade{opacity:0;animation:chipIn .6s cubic-bezier(.16,1,.3,1) forwards}
@media(max-width:760px){.shell{grid-template-columns:1fr}.side{display:none}}
</style>
</head>
<body>
<div class="shell">
  <!-- sidebar -->
  <aside class="side">
    <div class="brand"><div class="logo">K</div><b>KWIQ</b></div>
    <button class="new-chat"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>New chat</button>
    <div class="nav-label">Workspace</div>
    <nav class="nav">
      <a class="active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h7v7H4zM13 4h7v4h-7zM13 11h7v9h-7zM4 13h7v7H4z"/></svg>Dashboard</a>
      <a><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/></svg>Pipeline</a>
      <a><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Contacts</a>
      <a><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Smart Plans</a>
    </nav>
    <div class="nav-label" style="margin-top:var(--space-6)">Recent</div>
    <nav class="nav">
      <a><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Oakmont listing copy</a>
      <a><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>78704 market update</a>
    </nav>
    <div class="side-foot"><div class="av">N</div><div><b>Nina Alvarez</b><small>KW Austin</small></div></div>
  </aside>

  <!-- main -->
  <div class="main">
    <div class="topbar">
      <button class="icon-btn" aria-label="More"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.7"/><circle cx="12" cy="12" r="1.7"/><circle cx="19" cy="12" r="1.7"/></svg></button>
      <button class="icon-btn" aria-label="Open in new window"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg></button>
      <button class="icon-btn" aria-label="Close"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>

    <div class="work">
      <div class="center">
        <div class="k-mark fade">K</div>
        <h1 class="fade" style="animation-delay:.05s"><span class="hi">Hello, Nina.</span> What do you want to do?</h1>
        <div class="sub fade" style="animation-delay:.1s">Reference any tab with @, choose your tools, and KWIQ works across your data.</div>

        <div class="composer fade" style="animation-delay:.16s">
          <div class="field">
            <span class="tab-token">@ Pipeline</span>
            <input id="prompt" placeholder="Ask about this tab…" />
          </div>
          <div class="rail">
            <div class="rail-left">
              <button class="plus" aria-label="Add context"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
              <button class="tool"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 0 0-5.6 5.6l-6 6a2 2 0 1 0 2.8 2.8l6-6a4 4 0 0 0 5.6-5.6l-2.5 2.5-2.1-2.1z"/></svg>Tools</button>
            </div>
            <div class="rail-right">
              <button class="model">KWIQ Flash <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></button>
              <button class="voice" aria-label="Voice input"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg></button>
              <button class="send" aria-label="Send"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button>
            </div>
          </div>
        </div>

        <div class="connect" id="connect">
          <span class="lbl">Connected:</span>
        </div>

        <div class="presets" id="presets"></div>
      </div>
    </div>
  </div>
</div>

<script>
const SRC=[['CRM',1],['Calendar',1],['MLS',1],['Email',0]];
const cwrap=document.getElementById('connect');
SRC.forEach((s,i)=>{const b=document.createElement('button');b.className='source'+(s[1]?'':' off');b.style.animationDelay=(0.2+i*0.06)+'s';
  b.innerHTML=`<span class="dot"></span>${s[0]}`+(s[1]?'':' <span style="color:var(--system-action);font-weight:800">+ Connect</span>');cwrap.appendChild(b);});

const I={cube:'<path d="M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/>',
  user:'<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
  pencil:'<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/>',
  doc:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/>'};
const P=[['cube','Summarize my pipeline'],['user','Find contacts to call today'],['pencil','Draft a listing'],['doc','Create a smart plan']];
const pwrap=document.getElementById('presets');
P.forEach((p,i)=>{const b=document.createElement('button');b.className='preset fade';b.style.animationDelay=(0.3+i*0.05)+'s';
  b.innerHTML=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${I[p[0]]}</svg>${p[1]}`;
  b.onclick=()=>{const f=document.getElementById('prompt');f.value=p[1];f.focus();};pwrap.appendChild(b);});
</script>
</body>
</html>
